syntax = "proto3";

package rooms;


option go_package = "github.com/olegetoya/booking/protos/gen/go/hotelsvc/rooms;roomsv1";

service Rooms {
  rpc GetAll (GetAllRequest) returns (GetAllResponse);
  rpc Get (GetRequest) returns (GetResponse);
}

message GetAllRequest {
  int64 hotelID = 1;
}

message GetAllResponse {
  repeated Room rooms = 1;
}

message GetRequest {
  int64 hotelID = 1;
  int64 roomID = 2;
}

message GetResponse {
  Room room = 1;
}

message Room {
  int64 roomID = 1;
  int64 hotelID = 2;
  int32 roomNum = 3;
  string type = 5;
  int64 cost = 6;
  int32 isAvailable = 7;
}
